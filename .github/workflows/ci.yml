name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint -- --max-warnings=0

      - name: Build Next app
        run: npm run build

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker images and push to GHCR & ECR
        run: |
          IMAGE_NAMESPACE=ghcr.io/${{ github.repository }}
          AWS_ACCOUNT_ID=${{ secrets.AWS_ACCOUNT_ID }}
          AWS_REGION=${{ secrets.AWS_REGION }}

          ECR_FRONTEND_REPO="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/hireai-frontend"
          ECR_BACKEND_REPO="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/hireai-backend"

          echo "Logging in to ECR..."
          aws --version || pip install awscli --quiet
          aws ecr get-login-password --region "${AWS_REGION}" | docker login --username AWS --password-stdin "${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"

          echo "Building frontend image..."
          docker build -t hireai-frontend \
                       -t "${IMAGE_NAMESPACE}-frontend:latest" \
                       -t "${IMAGE_NAMESPACE}-frontend:${GITHUB_SHA}" \
                       -t "${ECR_FRONTEND_REPO}:latest" \
                       -t "${ECR_FRONTEND_REPO}:${GITHUB_SHA}" \
                       -f Dockerfile .

          echo "Building backend image..."
          docker build -t hireai-backend \
                       -t "${IMAGE_NAMESPACE}-backend:latest" \
                       -t "${IMAGE_NAMESPACE}-backend:${GITHUB_SHA}" \
                       -t "${ECR_BACKEND_REPO}:latest" \
                       -t "${ECR_BACKEND_REPO}:${GITHUB_SHA}" \
                       -f backend/Dockerfile .

          if [ "${{ github.event_name }}" = "push" ]; then
            echo "Pushing images to GitHub Container Registry..."
            docker push "${IMAGE_NAMESPACE}-frontend:latest"
            docker push "${IMAGE_NAMESPACE}-frontend:${GITHUB_SHA}"
            docker push "${IMAGE_NAMESPACE}-backend:latest"
            docker push "${IMAGE_NAMESPACE}-backend:${GITHUB_SHA}"

            echo "Pushing images to Amazon ECR..."
            docker push "${ECR_FRONTEND_REPO}:latest"
            docker push "${ECR_FRONTEND_REPO}:${GITHUB_SHA}"
            docker push "${ECR_BACKEND_REPO}:latest"
            docker push "${ECR_BACKEND_REPO}:${GITHUB_SHA}"
          else
            echo "Not a push event; skipping docker push. Images built locally for verification only."
          fi

      # Deployment steps (ECS/EKS/etc.) can be added later, consuming these images
