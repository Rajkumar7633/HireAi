# ─── HireAI Nginx Reverse Proxy Config ───────────────────────────────────────
# Handles: frontend (port 3000) + backend (port 5001) behind a single port 80

worker_processes auto;
worker_rlimit_nofile 65535;

events {
  worker_connections 4096;
  use epoll;
  multi_accept on;
}

http {
  # ─── Basic settings ────────────────────────────────────────────────────────
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;
  keepalive_timeout 65;
  types_hash_max_size 2048;
  server_tokens off;             # hide nginx version in headers

  # ─── Gzip compression ──────────────────────────────────────────────────────
  gzip              on;
  gzip_vary         on;
  gzip_proxied      any;
  gzip_comp_level   6;
  gzip_min_length   256;
  gzip_types
    application/javascript
    application/json
    application/xml
    application/rss+xml
    text/css
    text/javascript
    text/plain
    text/xml
    image/svg+xml
    font/opentype
    font/woff
    font/woff2;

  # ─── Logging ───────────────────────────────────────────────────────────────
  log_format main '$remote_addr - $remote_user [$time_local] '
                  '"$request" $status $body_bytes_sent '
                  '"$http_referer" "$http_user_agent" '
                  'rt=$request_time';

  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log  warn;

  # ─── Upstreams ─────────────────────────────────────────────────────────────
  upstream frontend {
    server frontend:3000;
    keepalive 32;
  }

  upstream backend {
    server backend:5001;
    keepalive 32;
  }

  # ─── Rate limiting zones ───────────────────────────────────────────────────
  limit_req_zone $binary_remote_addr zone=api:10m   rate=30r/s;
  limit_req_zone $binary_remote_addr zone=auth:10m  rate=5r/s;

  # ─── Main server ───────────────────────────────────────────────────────────
  server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options           "DENY"                            always;
    add_header X-Content-Type-Options    "nosniff"                         always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=()"         always;

    client_max_body_size 20m;

    # ─── Backend API ─────────────────────────────────────────────────────────
    location /api/ {
      limit_req zone=api burst=60 nodelay;

      proxy_pass         http://backend;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   Connection        "";

      # Timeouts
      proxy_connect_timeout 10s;
      proxy_send_timeout    60s;
      proxy_read_timeout    60s;
    }

    # Stricter rate limit for auth routes
    location /api/auth/ {
      limit_req zone=auth burst=10 nodelay;

      proxy_pass         http://backend;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   Connection        "";
    }

    # ─── WebSocket (Socket.io) ───────────────────────────────────────────────
    location /socket.io/ {
      proxy_pass         http://backend;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host       $host;
      proxy_read_timeout 86400s;
    }

    # ─── Static uploads from backend ────────────────────────────────────────
    location /uploads/ {
      proxy_pass       http://backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      expires          7d;
      add_header       Cache-Control "public, max-age=604800, immutable";
    }

    # ─── Next.js static assets (long cache) ─────────────────────────────────
    location /_next/static/ {
      proxy_pass       http://frontend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      expires          1y;
      add_header       Cache-Control "public, max-age=31536000, immutable";
    }

    # ─── Frontend (all other routes → Next.js) ──────────────────────────────
    location / {
      proxy_pass         http://frontend;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host       $host;
      proxy_set_header   X-Real-IP  $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_cache_bypass $http_upgrade;
    }

    # ─── Health endpoint (for load balancers) ────────────────────────────────
    location /nginx-health {
      return 200 '{"status":"ok"}';
      add_header Content-Type application/json;
      access_log off;
    }
  }
}
