version: "3.9"
services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      - PORT=5001
      - MONGODB_URI=mongodb://mongo:27017/hireai
      - FRONTEND_URL=http://frontend:3000
    depends_on:
      - mongo
    ports:
      - "5001:5001"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_BACKEND_URL=http://backend:5001
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  mongo-data:
